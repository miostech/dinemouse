<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Redefinir senha - Dine Mouse</title>
    <link rel="icon" type="image/png" href="/favicon.png" sizes="512x512">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .recover-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; background: linear-gradient(135deg, rgba(245, 247, 250, 0.98) 0%, rgba(255, 255, 255, 0.98) 100%); }
        .recover-card { width: 100%; max-width: 420px; background: #fff; border-radius: 16px; padding: 2rem; box-shadow: 0 8px 32px rgba(75, 63, 114, 0.12); border: 1px solid rgba(75, 63, 114, 0.1); }
        .recover-card h1 { font-family: var(--font-display); color: var(--azul-profundo); font-size: 1.5rem; margin: 0 0 0.5rem; }
        .recover-card p.lead { color: #555; font-size: 0.95rem; line-height: 1.55; margin: 0 0 1.5rem; }
        .recover-msg { font-size: 0.9rem; margin-top: 1rem; min-height: 1.25rem; }
        .recover-msg.error { color: #b00020; }
        .recover-msg.ok { color: #1b5e20; }
        .recover-actions { margin-top: 1.5rem; text-align: center; }
        .recover-actions a { color: var(--roxo-magico); font-weight: 600; }
    </style>
</head>
<body>
    <div class="recover-page">
        <div class="recover-card">
            <h1>Nova senha</h1>
            <p class="lead">Defina uma nova senha para a sua conta Dine Mouse. O link do e-mail expira em 1 hora.</p>

            <form id="recoverForm" class="contact-form" style="gap: 1rem;">
                <div class="form-group">
                    <label for="newPw1">Nova senha (mín. 8 caracteres)</label>
                    <input type="password" id="newPw1" name="newPw1" required minlength="8" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="newPw2">Confirmar senha</label>
                    <input type="password" id="newPw2" name="newPw2" required minlength="8" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-submit" id="recoverSubmit">Guardar nova senha</button>
            </form>
            <p id="recoverMsg" class="recover-msg" role="status"></p>
            <div class="recover-actions">
                <a href="/index.html">← Voltar ao site</a>
            </div>
        </div>
    </div>
    <script>
(function () {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const form = document.getElementById('recoverForm');
    const msg = document.getElementById('recoverMsg');
    const btn = document.getElementById('recoverSubmit');

    if (!token) {
        form.style.display = 'none';
        msg.className = 'recover-msg error';
        msg.textContent = 'Link inválido ou incompleto. Peça um novo e-mail em «Recuperar senha» no login.';
        return;
    }

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        msg.className = 'recover-msg';
        msg.textContent = '';

        const p1 = document.getElementById('newPw1').value;
        const p2 = document.getElementById('newPw2').value;
        if (p1.length < 8) {
            msg.className = 'recover-msg error';
            msg.textContent = 'A senha deve ter pelo menos 8 caracteres.';
            return;
        }
        if (p1 !== p2) {
            msg.className = 'recover-msg error';
            msg.textContent = 'As senhas não coincidem.';
            return;
        }

        btn.disabled = true;
        const original = btn.textContent;
        btn.textContent = 'A guardar…';

        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, newPassword: p1 }),
            });
            const data = await res.json().catch(function () { return {}; });

            if (res.ok && data.ok) {
                msg.className = 'recover-msg ok';
                msg.textContent = 'Senha atualizada. Já pode entrar no Portal com a nova senha.';
                form.style.display = 'none';
                return;
            }

            msg.className = 'recover-msg error';
            if (data.error === 'invalid_or_expired_token') {
                msg.textContent = 'Este link expirou ou já foi usado. Solicite um novo e-mail em «Recuperar senha».';
            } else {
                msg.textContent = 'Não foi possível alterar a senha. Tente novamente ou contacte o suporte.';
            }
        } catch (err) {
            msg.className = 'recover-msg error';
            msg.textContent = 'Erro de rede. Verifique a ligação e tente de novo.';
        } finally {
            btn.disabled = false;
            btn.textContent = original;
        }
    });
})();
    </script>
</body>
</html>
